services:
  docs:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/bkit-docs/', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    init: true
